<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinotico - Replica Visual</title>
  <style>
    :root {
      --bg: #5f7068;
      --panel: #79887f;
      --line: #0e1a13;
      --track: #cbc6ac;
      --tab: #d6d7d3;
      --tab-border: #8a8f8d;
      --tab-active: #eadc9f;
      --led-yellow: #e5da55;
      --led-green: #18b44a;
      --led-red: #f50101;
      --block: #9ca0a2;
      --label: #272f22;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #2d3530;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 8px;
      font-family: Tahoma, Verdana, Arial, sans-serif;
    }

    .frame {
      width: min(1024px, 98vw);
      aspect-ratio: 4 / 3;
      border: 3px solid #2b332f;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.45);
    }

    .top-bar,
    .mid-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 32px;
      background: #6b7c73;
      border-bottom: 2px solid #3f4c45;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 10px;
    }

    .top-bar {
      top: 0;
    }

    .mid-bar {
      top: 227px;
      border-top: 2px solid #3f4c45;
    }

    .tab {
      min-width: 76px;
      padding: 2px 10px;
      height: 22px;
      font-size: 14px;
      color: #303532;
      background: var(--tab);
      border: 2px solid var(--tab-border);
      text-align: center;
      line-height: 16px;
      box-shadow: inset 0 1px 0 #f4f5f3;
    }

    .tab.wide {
      min-width: 100px;
    }

    .tab.active {
      background: var(--tab-active);
    }

    .black-pane {
      position: absolute;
      top: 32px;
      left: 0;
      width: 100%;
      height: 195px;
      background: #050607;
      border-bottom: 2px solid #2f3a35;
    }

    .main {
      position: absolute;
      top: 259px;
      left: 0;
      width: 100%;
      height: calc(100% - 259px);
      background: var(--panel);
      overflow: hidden;
    }

    .layer {
      position: absolute;
      inset: 0;
    }

    .label-chip {
      position: absolute;
      top: 20px;
      left: 10px;
      background: #4e5f79;
      border: 2px solid #93a1b5;
      color: #dbe2ed;
      font-size: 17px;
      padding: 1px 8px;
    }

    .plate {
      position: absolute;
      background: #d2cdb5;
      border-bottom: 4px solid #0b5d35;
      border-left: 2px solid #385443;
      border-right: 2px solid #385443;
      height: 20px;
    }

    .block {
      position: absolute;
      width: 30px;
      height: 28px;
      border: 2px solid #60656b;
      background: var(--block);
      box-shadow: inset 0 0 0 2px #babdbf;
      color: #3927b8;
      font-weight: 700;
      font-size: 26px;
      text-align: center;
      line-height: 22px;
    }

    .tiny-console {
      position: absolute;
      width: 32px;
      height: 22px;
      border: 2px solid #666;
      background: linear-gradient(#f2f2f2, #d4d4d4);
    }

    .tiny-console::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 4px;
      left: 8px;
      top: 13px;
      background: #3a5d88;
    }

    .led {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #4f4f4f;
    }

    .y { background: var(--led-yellow); }
    .g { background: var(--led-green); }
    .r { background: var(--led-red); }

    .bus {
      position: absolute;
      height: 12px;
      background: var(--track);
      border: 2px solid #64604d;
    }

    .bus.small {
      height: 10px;
    }

    .text {
      position: absolute;
      color: var(--label);
      font-size: 30px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 #b9c1b9;
    }

    .text.sm {
      font-size: 19px;
      font-weight: 700;
    }

    .head {
      font-size: 38px;
      letter-spacing: 0;
      text-shadow: 1px 1px 0 #c3cac2;
      white-space: nowrap;
    }

    .head.top {
      font-size: 16px;
      font-weight: 700;
    }

    .head.sub {
      font-size: 12px;
      font-weight: 700;
    }

    .text.xs {
      font-size: 14px;
      font-weight: 700;
    }

    .matrix {
      position: absolute;
      border: 2px solid #434f48;
      background: #5f6c67;
      width: 130px;
      height: 90px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 8px;
    }

    .matrix .dotrow {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }

    .matrix .dotrow .led {
      position: static;
      width: 12px;
      height: 12px;
    }

    .hub {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 2px solid #667;
      background: linear-gradient(#f4f4f4, #d8d8d8);
    }

    .hub::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 8px;
      width: 12px;
      height: 10px;
      border: 1px solid #71848d;
      background: #3f5f6d;
    }

    .module {
      position: absolute;
      width: 34px;
      height: 22px;
      border: 2px solid #596366;
      background: linear-gradient(#e6e7e5, #cfd2cd);
      box-shadow: inset 0 1px 0 #f7f8f6;
    }

    .module::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 7px;
      width: 22px;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #2e566a,
        #2e566a 2px,
        #6e92a0 2px,
        #6e92a0 4px
      );
      border: 1px solid #567b8a;
    }

    .cabinet {
      position: absolute;
      width: 70px;
      height: 98px;
      border: 2px solid #4f5659;
      background: linear-gradient(#c6c9c6, #a8acaa);
      box-shadow: inset 0 0 0 2px #d6d9d4;
    }

    .cabinet::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 16px;
      width: 38px;
      height: 60px;
      background: repeating-linear-gradient(
        90deg,
        #1d2a31,
        #1d2a31 3px,
        #6a8f9f 3px,
        #6a8f9f 5px
      );
      border: 1px solid #48545a;
    }

    .switch {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 2px solid #7f8481;
      background: #a24671;
    }

    .switch::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 6px;
      height: 6px;
      background: #d5d7d8;
      border: 1px solid #73787a;
    }

    .lever {
      position: absolute;
      width: 2px;
      height: 17px;
      background: #8a2c52;
      transform: rotate(34deg);
      transform-origin: top;
    }

    .wire-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .wire-main {
      stroke: #111a14;
      stroke-width: 3;
      fill: none;
      stroke-linecap: square;
      stroke-linejoin: miter;
    }

    .wire-branch {
      stroke: #111a14;
      stroke-width: 2;
      fill: none;
    }

    .vcol {
      position: absolute;
      width: 30px;
      background: #c4c9ce;
      border: 2px solid #545a60;
      display: grid;
      grid-template-rows: repeat(16, 1fr);
      gap: 2px;
      padding: 3px;
    }

    .vcol .lamp {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #4f4f4f;
      justify-self: center;
      background: #7a2146;
    }

    .vcol .lamp.on {
      background: var(--led-yellow);
    }

    .line {
      position: absolute;
      background: var(--line);
      z-index: 1;
    }

    @media (max-width: 900px) {
      .text { font-size: 24px; }
      .text.sm { font-size: 15px; }
      .text.xs { font-size: 12px; }
      .tab { font-size: 12px; min-width: 64px; }
    }
  </style>
</head>

  <script>
    function addModuleRow(id, startX, y, count, startNum, spacing) {
      const host = document.getElementById(id);
      for (let i = 0; i < count; i += 1) {
        const module = document.createElement('div');
        module.className = 'module';
        module.style.left = `${startX + (i * spacing)}px`;
        module.style.top = `${y}px`;
        host.appendChild(module);

        const t = document.createElement('div');
        t.className = 'text xs';
        t.style.left = `${startX + 11 + (i * spacing)}px`;
        t.style.top = `${y + 26}px`;
        t.textContent = String(startNum + i);
        host.appendChild(t);

        const led = document.createElement('div');
        const ledType = i % 8 === 0 ? 'g' : (i % 2 === 0 ? 'y' : 'r');
        led.className = `led ${ledType}`;
        led.style.left = `${startX + 11 + (i * spacing)}px`;
        led.style.top = `${y - 18}px`;
        host.appendChild(led);
      }
    }

    function addSwitches(id, points, yBox, yLever) {
      const host = document.getElementById(id);
      points.forEach((x) => {
        const sw = document.createElement('div');
        sw.className = 'switch';
        sw.style.left = `${x}px`;
        sw.style.top = `${yBox}px`;
        host.appendChild(sw);

        const lever = document.createElement('div');
        lever.className = 'lever';
        lever.style.left = `${x + 7}px`;
        lever.style.top = `${yLever}px`;
        host.appendChild(lever);
      });
    }

    addModuleRow('rowA', 520, 242, 11, 6, 40);
    addModuleRow('rowB', 208, 427, 22, 18, 34);

    addSwitches('swTop', [554, 594, 634, 674, 714, 754, 794, 834, 874, 914, 954], 343, 361);
    addSwitches('swBottom', [228, 262, 296, 330, 398, 432, 466, 534, 568, 602, 636, 704, 738, 772, 806, 840, 874, 908, 942], 394, 412);

    const lamps = Array.from(document.querySelectorAll('.led.y'));
    let on = true;
    setInterval(() => {
      on = !on;
      lamps.forEach((l) => {
        l.style.filter = on ? 'brightness(1.12)' : 'brightness(0.72)';
      });
    }, 600);
  </script>
