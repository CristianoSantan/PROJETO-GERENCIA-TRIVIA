<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinotico - Gerencia CCO </title>
  <style>
    :root {
      --bg: #5f7068;
      --panel: #79887f;
      --line: #0e1a13;
      --track: #cbc6ac;
      --tab: #d6d7d3;
      --tab-border: #8a8f8d;
      --tab-active: #eadc9f;
      --led-yellow: #e5da55;
      --led-green: #18b44a;
      --led-red: #c45178;
      --block: #9ca0a2;
      --blockC: #606060;
      --label: #272f22;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #2d3530;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      font-family: Tahoma, Verdana, Arial, sans-serif;
      overflow-x: auto;
    }
    .frame {
      width: 1400px;
      height: 1000px;
      border: 3px solid #2b332f;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.45);
      transform-origin: top left;
    }
    @media (max-width: 1024px) {
      .frame {
        transform: scale(calc(100vw / 1024));
        width: 1024px;
        height: 768px;
      }
    }
    .top-bar, .mid-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 32px;
      background: #6b7c73;
      border-bottom: 2px solid #3f4c45;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 10px;
    }
    .top-bar { top: 0; }
    .mid-bar {
      top: 227px;
      border-top: 2px solid #3f4c45;
    }
    .tab {
      min-width: 76px;
      padding: 2px 10px;
      height: 22px;
      font-size: 14px;
      color: #303532;
      background: var(--tab);
      border: 2px solid var(--tab-border);
      text-align: center;
      line-height: 16px;
      box-shadow: inset 0 1px 0 #f4f5f3;
      cursor: default;
    }
    .tab.wide { min-width: 100px; }
/* EFEITO DE BOTÃO PRESSIONADO */
  .tab:active {
    /* Troca o brilho superior por uma sombra interna, dando a ilusão de profundidade (afundado) */
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2) !important;
    
    /* Escurece a cor de fundo em 5% para simular a perda de luz ao afundar */
    filter: brightness(0.95);
    
    /* Empurra o botão visualmente 1px para baixo */
    transform: translateY(1px);
  }
    .black-pane {
      position: absolute;
      top: 32px;
      left: 0;
      width: 100%;
      height: 195px;
      background: #050607;
      border-bottom: 2px solid #2f3a35;
    }
    .main {
      position: absolute;
      top: 259px;
      left: 0;
      width: 100%;
      height: calc(100% - 259px);
      background: var(--panel);
      overflow: hidden;
    }
    .layer { position: absolute; inset: 0; }
    .label-chip {
      position: absolute;
      top: 20px;
      left: 10px;
      background: #4e5f79;
      border: 2px solid #93a1b5;
      color: #dbe2ed;
      font-size: 17px;
      padding: 1px 8px;
    }
    .plate, .platerow {
      position: absolute;
      background: #d2cdb5;
      border-bottom: 4px solid #0b5d35;
      border-left: 2px solid #385443;
      border-right: 2px solid #385443;
      height: 30px;
      transform: skewX(-15deg);
    }
    .scada-module {
      position: absolute;
      display: inline-flex;
      flex-direction: column;
      width: 80px;
      background-color: #fff9f9;
      border: 2px solid #333;
    }
    .scada-module .module-top {
      height: 30px;
      background-color: #ffffff;
      border-bottom: 2px solid #444;
      border-top: 2px solid #ddd;
    }
    .scada-module .module-bottom {
      display: flex;
      height: 40px;
    }
    .scada-module .module-side {
      flex: 1;
      background-color: #696969;
      border-top: 2px solid #555;
    }
    .led {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #4f4f4f;
    }
    .y { background: var(--led-yellow); }
    .g { background: var(--led-green); }
    .r { background: var(--led-red); }
    .bus {
      position: absolute;
      height: 12px;
      background: var(--track);
      border: 2px solid #64604d;
    }
    .bus.small { height: 10px; }
    .text {
      position: absolute;
      color: var(--label);
      font-size: 30px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 #b9c1b9;
    }
    .text.sm { font-size: 19px; font-weight: 700; }
    .head {
      font-size: 15px;
      letter-spacing: 0;
      text-shadow: 1px 1px 0 #c3cac2;
      white-space: nowrap;
    }
    .head.top { font-size: 16px; font-weight: 700; }
    .head.sub { font-size: 12px; font-weight: 700; }
    .text.xs { font-size: 14px; font-weight: 700; }
    .matrix {
      position: absolute;
      border: 2px solid #434f48;
      background: #5f6c67;
      width: 130px;
      height: 90px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 8px;
    }
    .matrix .dotrow {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }
    .matrix .dotrow .led {
      position: static;
      width: 12px;
      height: 12px;
    }
    .module {
      position: absolute;
      width: 34px;
      height: 22px;
      border: 2px solid #596366;
      background: linear-gradient(#e6e7e5, #cfd2cd);
      box-shadow: inset 0 1px 0 #f7f8f6;
    }
    .module::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 7px;
      width: 22px;
      height: 8px;
      background: repeating-linear-gradient(90deg, #2e566a, #2e566a 2px, #6e92a0 2px, #6e92a0 4px);
      border: 1px solid #567b8a;
    }
    .cabinet {
      position: absolute;
      width: 60px;
      height: 110px;
      background: #ccc;
      border: 2px solid #444;
      z-index: 10;
      box-shadow: inset 3px 3px 0 #eee, inset -3px -3px 0 #999;
    }
    .cabinet-number {
      position: absolute;
      bottom: 5px;
      width: 100%;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }
    .cabinet::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 10px;
      width: 36px;
      height: 50px;
      background: repeating-linear-gradient(180deg, #333, #333 2px, #888 2px, #888 4px);
      border: 1px solid #111;
    }
    
    /* WORKSTATIONS E OUTROS */
    .workstation { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 10; }
    .monitors-wrapper { display: flex; gap: 2px; z-index: 2; }
    .crt-monitor { width: 44px; height: 38px; background: #c0c0c0; border-top: 2px solid #ffffff; border-left: 2px solid #ffffff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; box-shadow: 2px 2px 0px rgba(0,0,0,0.8); padding: 4px; }
    .crt-screen { width: 100%; height: 100%; background: #6385ff; border-top: 2px solid #404040; border-left: 2px solid #404040; border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff; }
    .desktop-base { width: 68px; height: 16px; background: #c0c0c0; border-top: 2px solid #ffffff; border-left: 2px solid #ffffff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; box-shadow: 3px 3px 0px rgba(0,0,0,0.8); margin-top: -2px; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .floppy-drive { width: 24px; height: 4px; background: #000000; border-bottom: 1px solid #ffffff; border-right: 1px solid #ffffff; }
    .power-button { width: 4px; height: 4px; background: #404040; border-bottom: 1px solid #ffffff; border-right: 1px solid #ffffff; }
    .desk-unit { position: absolute; width: 170px; height: 35px; z-index: 10; }
    .desk-unit .monoscreen-pc { position: absolute; display: flex; flex-direction: column; align-items: center; }
    .desk-unit .crt-single-screen { width: 50px; height: 40px; background: var(--tab); border-top: 3px solid #f4f5f3; border-left: 3px solid #f4f5f3; border-right: 3px solid #8a8f8d; border-bottom: 3px solid #8a8f8d; padding: 4px; }
    .desk-unit .pc-base { width: 50px; height: 12px; background: var(--tab); border-top: 3px solid #f4f5f3; border-left: 3px solid #f4f5f3; border-right: 3px solid #8a8f8d; border-bottom: 3px solid #8a8f8d; margin-top: 1px; }
    .desk-unit .inner-screen.white { width: 100%; height: 100%; background: #ffffff; box-shadow: inset 1px 1px 0 #8a8f8d, inset -1px -1px 0 #f4f5f3; }
    .desk-unit .dotmatrix-printer { position: absolute; }
    .desk-unit .printer-body { width: 50px; height: 25px; background: var(--tab); border-top: 3px solid #f4f5f3; border-left: 3px solid #f4f5f3; border-right: 3px solid #8a8f8d; border-bottom: 3px solid #8a8f8d; display: flex; justify-content: center; position: relative; }
    .desk-unit .paper-sheet.white { position: absolute; top: -25px; width: 35px; height: 30px; background: #ffffff; transform: skewX(-15deg) scaleX(0.9); box-shadow: inset 1px 1px 0 #8a8f8d, inset -1px -1px 0 #f4f5f3, 2px 2px 0 rgba(0,0,0,0.4); }
    .equipment-wrapper { left: 10px; top:230px; position: absolute; display: flex; align-items: flex-end; gap: 20px; z-index: 10; }
    .dotmatrix-printer-v2 { position: relative; }
    .printer-v2-base { width: 70px; height: 20px; background: #c0c0c0; border-top: 2px solid #ffffff; border-left: 2px solid #ffffff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; position: relative; z-index: 3; }
    .printer-v2-slot { position: absolute; top: 3px; left: 8px; width: 50px; height: 8px; background: #808080; border-top: 2px solid #404040; border-left: 2px solid #404040; border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff; }
    .printer-v2-knob { position: absolute; right: -4px; top: 5px; width: 4px; height: 10px; background: #000000; }
    .printer-v2-paper { position: absolute; top: -18px; left: 16px; width: 40px; height: 24px; background: #ffffff; transform: skewX(-15deg); border-left: 1px solid #c0c0c0; border-top: 1px solid #c0c0c0; box-shadow: 2px 2px 0 rgba(0,0,0,0.3); z-index: 2; }
    .flat-console { position: relative; }
    .console-body { width: 60px; height: 16px; background: #c0c0c0; border-top: 2px solid #ffffff; border-left: 2px solid #ffffff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; display: flex; align-items: center; justify-content: center; }
    .console-front { width: 48px; height: 6px; background: #404040; border-top: 1px solid #000000; border-left: 1px solid #000000; border-right: 1px solid #a0a0a0; border-bottom: 1px solid #a0a0a0; display: flex; align-items: center; padding-left: 4px; }
    .console-label { width: 32px; height: 4px; background: #ffffff; }
    .line { position: absolute; background: var(--line); z-index: 1; }
    .main-container {
      display: flex;
      gap: 8px; 
      position: absolute; 
      width: 100px;
      z-index: 50;
    }
    .numbers-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-top: 6px;
    }
    .num, .numE {
      height: 20px;
      width: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: flex-start; 
      padding-left: 4px; 
      color: #ffffff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      letter-spacing: 1px;
      text-shadow: 
        -1px -1px 0 #000,  
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000,
         2px  2px 2px rgba(0,0,0,0.8);
    }
    .leds-panel {
      background-color: #e8e8ce;
      padding: 4px;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .led-box, .custom-led-added {
      background-color: #c0c0c0;
      width: 20px;
      height: 20px;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .toggle-checkbox { display: none; }
    .led-status {
      position: relative;
      display: block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #e62e2e; 
      cursor: pointer;
      border-style: solid;
      border-width: 2px;
      border-color: #ff9999 #880000 #880000 #ff9999;
      box-shadow: inset -1px -1px 3px rgba(255,255,255,0.4), 0 0 3px rgba(255,0,0,0.5);
      transition: all 0.1s ease;
    }
    .led-status::after {
      content: "Estado: 0";
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffffe1;
      border: 1px solid #000000;
      color: #000000;
      padding: 2px 4px;
      font-size: 11px;
      font-family: 'MS Sans Serif', Tahoma, Arial, sans-serif;
      font-weight: normal;
      white-space: nowrap;
      box-shadow: 1px 1px 0px rgba(0,0,0,0.5);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.1s ease 0.4s, visibility 0.1s ease 0.4s;
      z-index: 1000;
      pointer-events: none;
    }
    .led-status:hover::after {
      opacity: 1;
      visibility: visible;
    }
    .toggle-checkbox:checked ~ .led-status {
      background-color: #2eff2e; 
      border-color: #ccffcc #00802f #00802f #ccffcc;
      box-shadow: inset -1px -1px 3px rgba(255, 255, 255, 0.6), 
                  0 0 6px #00ff1e, 0 0 3px #15ff00;
    }
    .toggle-checkbox:checked ~ .led-status::after {
      content: "Estado: 1";
    }
    .wire-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .wire-branch {
      stroke: #111a14;
      stroke-width: 2;
      fill: none;
    }
    .container-diagnostic {
      display: flex;
      gap: 5px;
      padding: 20px;
      position: absolute;
    }
    .device-box {
      width: 75px;
      height: 35px;
      background-color: #333;
      border-top: 5px solid #a3a3a3;
      border-left: 5px solid #8e8e8e;
      border-right: 5px solid #4a4a4a;
      border-bottom: 5px solid #3b3b3b;
      border-radius: 4px;
      display: flex;
      padding: 4px 6px;
      box-sizing: border-box;
      box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
    }
    .grill {
      flex: 1;
      height: 100%;
      background: repeating-linear-gradient(
        90deg, #1a1a1a, #1a1a1a 4px, #909090 4px, #909090 8px,
        #b0b0b0 8px, #b0b0b0 10px, #1a1a1a 10px, #1a1a1a 14px
      );
      border: 2px solid #111;
      margin-right: 8px;
    }
    .panel-wrapper {
      width: 10px;
      height: 15px;
      background-color: #000;
      margin-top: auto;
      margin-bottom: auto;
      display: flex;
      flex-direction: column;
      border: 2px solid #1a1a1a;
    }
    .panel-top-white {
      height: 55%;
      background-color: #f2f2f2;
      position: relative;
      border-bottom: 2px solid #222;
    }
    .dot {
      width: 3px;
      height: 5px;
      background-color: #111;
      position: absolute;
      border-radius: 1px;
    }
    .dot-1 { top: 5px; left: 4px; }
    .dot-2 { bottom: 4px; right: 4px; }
    .panel-bottom-green {
      height: 45%;
      background-color: #106f3e;
      box-shadow: inset 0px 3px 5px rgba(0,0,0,0.6);
    }
    .btn-diag {
      position: absolute; /* Adicionado para validar propriedades top/left */
      z-index: 100;
      background-color: #747474; 
      color: #000000;
      font-family: "MS Sans Serif", Tahoma, Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
      border: 2px solid;
      border-color: #ffffff #000000 #000000 #ffffff;
      box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
    }
    .btn-diag:active {
      border-color: #000000 #ffffff #ffffff #000000;
      box-shadow: inset 1px 1px #808080, inset -1px -1px #dfdfdf;
      padding: 9px 15px 7px 17px; 
      z-index: 100;
    }

/* CSS DO SWITCH */
.switch-container {
    width: 20px;
    height: 20px;
    position: absolute;
    cursor: pointer;
  }
.wire { background-color: #000; position: absolute; left: 50%; transform: translateX(-50%); width: 2px; }
.wire-top { height: 4px; top: 0; }
.wire-bottom { height: 4px; bottom: 0; }
.terminal { width: 4px; height: 4px; background-color: #440013; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
.term-top { top: 4px; background-color: #ff0000; }
.term-bottom { bottom: 4px; }
.contact-arm { width: 2px; height: 10px; background-color: #800000; position: absolute; top: 6px; left: 50%; transform-origin: top center; transform: rotate(90deg); transition: transform 0.2s steps(3); box-shadow: 1px 1px 0px #000; }
.closed .contact-arm { transform: rotate(0deg); background-color: #FF0000; }
.closed .term-bottom { background-color: #00ff48; box-shadow: 0 0 4px #09ff00; }

/* CSS DO LED (Ajuste para visibilidade) */
.led-container {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}
  </style>
</head>

  const createCenteredText = (leftMultiplier1, leftMultiplier2, numStr) => {

    const posDir = startX + leftMultiplier2 * spacing;
    const centro = (posEsq + posDir) / 2 + 17;
    const el = document.createElement('div');
    el.className = 'text xs';
    el.style.position = 'absolute';
    el.style.left = `${centro}px`;
    el.style.top = `${yNormal + 26}px`;
    el.style.textAlign = 'center';
    el.style.transform = 'translateX(-50%)';
    el.style.textContent = numStr;
    return el;
  };
  
  fragment.appendChild(createCenteredText(3, 4, '31'));
  fragment.appendChild(createCenteredText(10, 11, '37'));
  
  host.appendChild(fragment);
}

function gerarRowD() {
  const host = document.getElementById('rowD');
  if (!host) return;
  const fragment = document.createDocumentFragment();
  const startX = 560, y = 340, spacing = 60;
  const numeros = [2, 3, 4, 5];
  
  numeros.forEach((numero, i) => {
    const leftPos = startX + i * spacing;
    const module = document.createElement('div');
    module.className = 'module';
    module.style.left = `${leftPos}px`;
    module.style.top = `${y}px`;
    fragment.appendChild(module);
    
    const text = document.createElement('div');
    text.className = 'text xs';
    text.style.left = `${leftPos + 11}px`;
    text.style.top = `${y + 21}px`;
    text.textContent = String(numero);
    fragment.appendChild(text);
  });
  
  host.appendChild(fragment);
}

function criarLed(id, left, top, container) {
  const ledContainer = document.createElement('div');
  ledContainer.className = 'custom-led-added';
  ledContainer.style.position = 'absolute';
  ledContainer.style.left = `${left}px`;
  ledContainer.style.top = `${top}px`;
  ledContainer.style.zIndex = '100';
  
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.id = `custom-led-${id}`;
  checkbox.className = 'toggle-checkbox';
  
  const label = document.createElement('label');
  label.htmlFor = `custom-led-${id}`;
  label.className = 'led-status';
  
  ledContainer.appendChild(checkbox);
  ledContainer.appendChild(label);
  container.appendChild(ledContainer);
}

function adicionarLedsInterativos() {
  const main = document.querySelector('.main');
  if (!main) return;
  
  // ==========================================
  // 1. CRIAÇÃO DA CAMADA DE FIOS (SVG BASE)
  // ==========================================
  let svgLayer = document.querySelector('.wire-layer');
  
  // Só cria o SVG se ele ainda não existir na tela
  if (!svgLayer) {
    svgLayer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svgLayer.setAttribute("class", "wire-layer");
    svgLayer.style.position = 'absolute';
    svgLayer.style.top = '0';
    svgLayer.style.left = '0';
    svgLayer.style.width = '100%';
    svgLayer.style.height = '100%';
    svgLayer.style.zIndex = '0'; 
    svgLayer.style.pointerEvents = 'none'; 
    main.insertBefore(svgLayer, main.firstChild);
  }
  
  // A LINHA QUE APAGAVA O CONTEÚDO DO SVG FOI REMOVIDA DAQUI!
  
  const elementos = document.querySelectorAll('.text, .text.xs, .cabinet-number');
  const fragment = document.createDocumentFragment();
  
  // ... (o resto do código continua exatamente igual a partir daqui) ...
  
  elementos.forEach(el => {
    const txt = el.textContent.trim();
    if (!/^\d+$/.test(txt)) return;
    
    const num = parseInt(txt, 10);
    const isBaixo = (num >= 2 && num <= 16) || num === 17;
    const isCima = (num >= 18 && num <= 39);
    
    if (!isBaixo && !isCima) return;
    if (document.getElementById(`custom-led-${num}`)) return;
    
    const elementoReferencia = el.classList.contains('cabinet-number') ? el.parentElement : el;

    const leftBase = elementoReferencia.offsetLeft;
    const topBase = elementoReferencia.offsetTop;
    
    let centroX = leftBase + (elementoReferencia.offsetWidth / 2);
    
    if (num === 31 || num === 37) {
      centroX += (elementoReferencia.offsetWidth / 2);
    }
    
    // ==========================================
    // 2. CÓDIGO DO LED 
    // ==========================================
    const ledContainer = document.createElement('div');
    ledContainer.className = 'custom-led-added';
    ledContainer.id = `custom-led-${num}`;
    ledContainer.style.position = 'absolute';
    ledContainer.style.left = `${centroX}px`;
    ledContainer.style.transform = 'translateX(-50%)';
    ledContainer.style.zIndex = '5'; // Garante que fica ACIMA do fio
    
    let ledTop;
    if (isBaixo) {
      ledTop = (num === 17) ? topBase + 140 : topBase + 40;
    } else {
      ledTop = topBase - 60;
    }
    ledContainer.style.top = `${ledTop}px`;
    
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.id = `custom-check-${num}`;
    checkbox.className = 'toggle-checkbox';
    
    const label = document.createElement('label');
    label.htmlFor = `custom-check-${num}`;
    label.className = 'led-status';
    
    ledContainer.appendChild(checkbox);
    ledContainer.appendChild(label);
    fragment.appendChild(ledContainer);

    // ==========================================
    // 3. CÓDIGO DO SWITCH
    // ==========================================
    const switchDiv = document.createElement('div');
    switchDiv.className = 'switch-container';
    switchDiv.id = `switch-${num}`;
    switchDiv.style.zIndex = '5';
    
    switchDiv.onclick = function() { 
      this.classList.toggle('closed'); 
    };
    
    switchDiv.innerHTML = `
      <div class="wire wire-top"></div>
      <div class="terminal term-top"></div>
      <div class="contact-arm"></div>
      <div class="terminal term-bottom"></div>
      <div class="wire wire-bottom"></div>
    `;

    switchDiv.style.left = `${centroX}px`;
    switchDiv.style.transform = 'translateX(-50%)';
    
    let switchTop;
    if (isBaixo) {
      switchTop = ledTop + 20;
      switchDiv.style.top = `${switchTop}px`;
    } else if (isCima) {
      switchTop = ledTop - 20;
      switchDiv.style.top = `${switchTop}px`;
    }
    fragment.appendChild(switchDiv);

    // ==========================================
    // 4. DESENHO DOS FIOS (Sem Sobreposição)
    // ==========================================
    let moduloBorda, ledBorda1, ledBorda2, switchBorda;
    const alturaLed = 20; // Altura estimada do seu container de LED
    
    if (isBaixo) {
      // De cima para baixo
      moduloBorda = topBase + elementoReferencia.offsetHeight; // Fundo do Módulo
      ledBorda1   = ledTop;                                    // Topo do LED
      ledBorda2   = ledTop + alturaLed;                        // Fundo do LED
      switchBorda = switchTop;                                 // Topo do Switch
    } else {
      // De baixo para cima
      moduloBorda = topBase;                                   // Topo do Módulo
      ledBorda1   = ledTop + alturaLed;                        // Fundo do LED
      ledBorda2   = ledTop;                                    // Topo do LED
      switchBorda = switchTop + 15;                            // Fundo do Switch (20 é a altura do switch)
    }

    // Fio 1: Do Módulo até a primeira borda do LED
    const linha1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    linha1.setAttribute("x1", centroX);
    linha1.setAttribute("y1", moduloBorda);
    linha1.setAttribute("x2", centroX);
    linha1.setAttribute("y2", ledBorda1);
    linha1.setAttribute("stroke", "#000000");
    linha1.setAttribute("stroke-width", "2");

    // Fio 2: Da segunda borda do LED até o Switch
    const linha2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    linha2.setAttribute("x1", centroX);
    linha2.setAttribute("y1", ledBorda2);
    linha2.setAttribute("x2", centroX);
    linha2.setAttribute("y2", switchBorda);
    linha2.setAttribute("stroke", "#000000");
    linha2.setAttribute("stroke-width", "2");

    svgLayer.appendChild(linha1);
    svgLayer.appendChild(linha2);
  });
  
  main.appendChild(fragment);
}
function desenharDiagramaEletricoCompleto() {
  const svgLayer = document.querySelector('.wire-layer');
  const main = document.querySelector('.main');
  if (!svgLayer || !main) return;

  // Limpa apenas as conexões geradas automaticamente
  const fiosAntigos = svgLayer.querySelectorAll('.fio-dinamico');
  fiosAntigos.forEach(f => f.remove());

  const mainRect = main.getBoundingClientRect();

  // --- HELPERS ---
  function criarLinha(x1, y1, x2, y2) {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("stroke", "black"); line.setAttribute("stroke-width", "2");
    line.setAttribute("class", "fio-dinamico");
    svgLayer.appendChild(line);
  }

  function criarBolinha(x, y) {
    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", x); dot.setAttribute("cy", y);
    dot.setAttribute("r", "4"); dot.setAttribute("fill", "black");
    dot.setAttribute("class", "fio-dinamico");
    svgLayer.appendChild(dot);
  }

  function getPos(id, tipo) {
    const el = document.getElementById(id);
    if (!el) return null;
    const r = (el.tagName === 'INPUT') ? el.parentElement.getBoundingClientRect() : el.getBoundingClientRect();
    let x = r.left - mainRect.left;
    let y = r.top - mainRect.top;
    if (tipo === 'cX') x += r.width / 2;
    if (tipo === 'cY') y += r.height / 2;
    if (tipo === 'dir') x += r.width;
    if (tipo === 'esq') x = r.left - mainRect.left;
    if (tipo === 'fundo') y += r.height;
    return { x, y, r };
  }

  const baseRack2X = getPos('ledB0', 'dir').x;

  // 1. CONEXÃO DIRETA ENTRE RACKS (A -> B)
  for (let i = 0; i <= 15; i++) {
    const a = getPos(`ledA${i}`, 'dir');
    const b = getPos(`ledB${i}`, 'esq');
    if (a && b) criarLinha(a.x, a.y + a.r.height/2, b.x, b.y + b.r.height/2);
  }

  // --- DEFINIÇÃO DOS CORREDORES (VIAS) PARA EVITAR CONFLITO ---
  // Vias Curtas (Sobem para soldar na horizontal dos mestres)
  const via3_solda = baseRack2X + 35; 
  const via4_solda = baseRack2X + 45; 
  const via8_solda = baseRack2X + 35; 
  const via9_solda = baseRack2X + 45; 

  // Vias Longas (Descem/Sobem para os barramentos dos switches)
  const via1 = baseRack2X + 120; // Canal LED 1 e 4
  const via6 = baseRack2X + 65; // Canal LED 6 e 8
  const via7 = baseRack2X + 85; // Canal LED 7 e 9
  const via0 = baseRack2X + 100; // Canal LED 0 e 3

  // ==========================================
  // GRUPO SUPERIOR (LED 0, 1, 3, 4) - ENTRA POR CIMA
  // ==========================================
  
  // LED 0 -> Switches 18-21
  const l0 = getPos('ledB0', 'cY');
  const sw18 = getPos('switch-18', 'y');
  const busY0 = sw18.y - 1; // Barramento 1
  const sw21X = getPos('switch-21', 'cX').x;

  criarLinha(baseRack2X, l0.y, via0, l0.y);
  criarLinha(via0, l0.y, via0, busY0);
  criarLinha(via0, busY0, sw21X, busY0);
  [18,19,20,21].forEach(n => {
    const s = getPos(`switch-${n}`, 'cX');
    criarLinha(s.x, busY0, s.x, s.y);
  });
  
  // LED 3 solda na linha horizontal do LED 0
  const l3 = getPos('ledB3', 'cY');
  if (l3 && l0) {
    criarLinha(baseRack2X, l3.y, via3_solda, l3.y);   // Sai do LED 3 na horizontal
    criarLinha(via3_solda, l3.y, via3_solda, l0.y);   // Sobe 90º até a altura do LED 0
    criarBolinha(via3_solda, l0.y);                   // Solda exatamente na linha de saída do 0
  }

  // LED 1 -> Switches 28-39
  const l1 = getPos('ledB1', 'cY');
  const sw28 = getPos('switch-28', 'y');
  const busY1 = sw28.y - 70; // Barramento 2 (MAIS ALTO para não cruzar)
  const sw39X = getPos('switch-39', 'cX').x;

  criarLinha(baseRack2X, l1.y, via1, l1.y);
  criarLinha(via1, l1.y, via1, busY1);
  criarLinha(via1, busY1, sw39X, busY1);
  for(let n=28; n<=39; n++) {
    const s = getPos(`switch-${n}`, 'cX');
    if(s) criarLinha(s.x, busY1, s.x, s.y);
  }

  // LED 4 solda na linha horizontal do LED 1
  const l4 = getPos('ledB4', 'cY');
  if (l4 && l1) {
    criarLinha(baseRack2X, l4.y, via4_solda, l4.y);   // Sai do LED 4 na horizontal
    criarLinha(via4_solda, l4.y, via4_solda, l1.y);   // Sobe 90º até a altura do LED 1
    criarBolinha(via4_solda, l1.y);                   // Solda na linha do LED 1
  }

  // ==========================================
  // GRUPO INFERIOR (LED 6, 7, 8, 9) - ENTRA POR BAIXO
  // ==========================================

  // LED 6 -> Gabinete 17 e Switches 2-5
  const l6 = getPos('ledB6', 'cY');
  const sw17F = getPos('switch-17', 'fundo');
  const sw2F = getPos('switch-2', 'fundo');
  const sw5X = getPos('switch-5', 'cX').x;
  const sw17C = getPos('switch-17', 'cX');

  if(l6 && sw17F) {
    const degrau17Y = sw17F.y + 16; // Nível abaixo do 17
    const desvioX = sw17C.x + 30;   // Passa à direita do gabinete
    const degrauSwY = sw2F.y + 25;  // Barramento dos switches 2-5

    criarLinha(baseRack2X, l6.y, via6, l6.y);
    criarLinha(via6, l6.y, via6, degrau17Y);
    criarLinha(via6, degrau17Y, desvioX, degrau17Y);
    // Conecta fundo do 17
    criarLinha(sw17C.x, degrau17Y, sw17C.x, sw17F.y);
    // Segue para os outros
    criarLinha(desvioX, degrau17Y, desvioX, degrauSwY);
    criarLinha(desvioX, degrauSwY, sw5X, degrauSwY);
    [2,3,4,5].forEach(n => {
      const s = getPos(`switch-${n}`, 'cX');
      const f = getPos(`switch-${n}`, 'fundo');
      criarLinha(s.x, degrauSwY, s.x, f.y);
    });
  }

  // LED 8 solda na linha horizontal do LED 6
  const l8 = getPos('ledB8', 'cY');
  if (l8 && l6) {
    criarLinha(baseRack2X, l8.y, via8_solda, l8.y);   // Sai do LED 8 na horizontal
    criarLinha(via8_solda, l8.y, via8_solda, l6.y);   // Sobe 90º até a altura do LED 6
    criarBolinha(via8_solda, l6.y);                   // Solda na linha do LED 6
  }

  // LED 7 -> Switches 6-16
  const l7 = getPos('ledB7', 'cY');
  const sw6F = getPos('switch-6', 'fundo');
  const busY7 = sw6F.y + 30; // MAIS BAIXO para não cruzar o barramento do LED 6
  const sw16X = getPos('switch-16', 'cX').x;

  criarLinha(baseRack2X, l7.y, via7, l7.y);
  criarLinha(via7, l7.y, via7, busY7);
  criarLinha(via7, busY7, sw16X, busY7);
  for(let n=6; n<=16; n++) {
    const s = getPos(`switch-${n}`, 'cX');
    const f = getPos(`switch-${n}`, 'fundo');
    criarLinha(s.x, busY7, s.x, f.y);
  }

  // LED 9 solda na linha horizontal do LED 7
  const l9 = getPos('ledB9', 'cY');
  if (l9 && l7) {
    criarLinha(baseRack2X, l9.y, via9_solda, l9.y);   // Sai do LED 9 na horizontal
    criarLinha(via9_solda, l9.y, via9_solda, l7.y);   // Sobe 90º até a altura do LED 7
    criarBolinha(via9_solda, l7.y);                   // Solda na linha do LED 7
  }

  // ==========================================
  // LIGAÇÕES DOS LEDs 10 a 13 (DEVICE BOXES)
  // ==========================================
  
  // Pega todos os componentes com a classe 'device-box' na tela
  const deviceBoxes = document.querySelectorAll('.device-box');
  
  if (deviceBoxes.length > 0) {
    const len = deviceBoxes.length;

    // Criamos novas Vias bem afastadas das antigas (que vão até 120)
    const via10 = baseRack2X + 90;
    const via11 = baseRack2X + 70;
    const via12 = baseRack2X + 50;
    const via13 = baseRack2X + 50;

    // Função para conectar o LED no TOPO do device-box em formato escadinha
    function conectarLedAoDevice(idLed, indexDevice, viaX, alturaDegrau) {
      if (indexDevice < 0 || indexDevice >= len) return; 
      
      const led = getPos(idLed, 'cY');
      const box = deviceBoxes[indexDevice];
      
      if (!led || !box) return;
      
      const r = box.getBoundingClientRect();
      const boxCentroX = r.left - mainRect.left + r.width / 2;
      const boxTopoY = r.top - mainRect.top;
      
      // Degrau onde o fio viaja horizontalmente (acima do componente)
      const busY = boxTopoY - alturaDegrau; 
      
      criarLinha(baseRack2X, led.y, viaX, led.y);         // Horizontal do LED até a via
      criarLinha(viaX, led.y, viaX, busY);                // Sobe/Desce verticalmente
      criarLinha(viaX, busY, boxCentroX, busY);           // Avança horizontalmente até o Box
      criarLinha(boxCentroX, busY, boxCentroX, boxTopoY); // Desce encostando no topo
    }

    // LED 10 -> ÚLTIMO device-box (Índice total menos 1)
    conectarLedAoDevice('ledB10', len - 1, via10, 15);
    
    // LED 11 -> PENÚLTIMO device-box (Índice total menos 2)
    conectarLedAoDevice('ledB11', len - 2, via11, 10);
    
    // LED 12 -> ANTEPENÚLTIMO device-box (Índice total menos 3)
    conectarLedAoDevice('ledB12', len - 3, via12, 5);
    
    // LED 13 -> PRIMEIRO device-box da esquerda (Índice 0)
    conectarLedAoDevice('ledB13', 0, via13, 1);
  }
}
window.addEventListener('load', () => {
  // O setTimeout aguarda a tela carregar por completo (800ms)
  setTimeout(() => {
    // 1º Passo: Cria os LEDs e Switches
    adicionarLedsInterativos();
    
    // 2º Passo: Desenha as conexões logo em seguida!
    desenharDiagramaEletricoCompleto();
    
  }, 800);
});
